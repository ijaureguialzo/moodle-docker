services:

  https-portal:
    image: steveltn/https-portal:1
    environment:
      CLIENT_MAX_BODY_SIZE: 16384M
      DOMAINS: >
        moodle.test -> http://moodle:80,
      STAGE: local
    volumes:
      - https-portal_certs:/var/lib/https-portal
      - https-portal_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - moodle

  moodle:
    build: .
    environment:
      - MOODLE_DATABASE_HOST=mariadb
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_USER=moodle
      - MOODLE_DATABASE_NAME=moodle
      - MOODLE_DATABASE_PASSWORD=12345Abcde
      - PHP_INI-post_max_size=16G
      - PHP_INI-upload_max_filesize=16G
    expose:
      - "80"
    volumes:
      - moodledata:/var/www/moodledata
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:11.8
    environment:
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: 12345Abcde
      MYSQL_RANDOM_ROOT_PASSWORD: '1'
    volumes:
      - mariadb:/var/lib/mysql

volumes:
  https-portal_certs:
  https-portal_logs:
  moodledata:
  mariadb:
